<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRADER FARHAN BOSS</title>
    <style>
        :root {
            --primary: #00f2fe;
            --neon: #39ff14;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* This loads the actual Registration site as your background */
        .bg-iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }

        /* Overlay to keep the login box on top */
        .ui-container {
            position: relative;
            z-index: 1000;
            pointer-events: none; /* Allows clicking the background through the empty space */
            height: 100vh;
            width: 100vw;
        }

        .login-popup {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 190px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid var(--primary);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 0 25px var(--primary);
            pointer-events: auto; /* Makes the box clickable */
        }

        .login-popup img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid var(--neon);
            margin-bottom: 10px;
        }

        .login-popup h3 {
            color: #fff;
            font-size: 11px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        input {
            width: 85%;
            padding: 10px;
            margin-bottom: 10px;
            background: #111;
            border: 1px solid var(--primary);
            color: #fff;
            border-radius: 5px;
            font-size: 12px;
        }

        .btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            color: #fff;
            text-decoration: none;
            display: block;
            margin-bottom: 5px;
        }

        .btn-login { background: #0072ff; }
        .btn-tg { background: #0088cc; }

        /* Hack UI */
        #hack-interface {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid var(--neon);
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 0 30px var(--neon);
            z-index: 2000;
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <iframe class="bg-iframe" src="https://dkwin9.com/#/register?invitationCode=33368100771"></iframe>

    <div class="ui-container">
        <div class="login-popup" id="login-box">
            <img src="https://i.postimg.cc/zGVJmVq2/Gemini-Generated-Image-juxottjuxottjuxo.png" alt="Logo">
            <h3>MUMINUL BOSS HACK</h3>
            <input type="password" id="passInput" placeholder="Enter Key">
            <button class="btn btn-login" onclick="checkLogin()">LOGIN</button>
            <a href="https://t.me/SM_COMMUNITY7X" class="btn btn-tg">TELEGRAM</a>
        </div>
    </div>

    <div id="hack-interface">
        <img src="https://i.postimg.cc/zGVJmVq2/Gemini-Generated-Image-juxottjuxottjuxo.png" style="width: 70px; border-radius: 50%;">
        <h2 style="color: #fff; font-size: 18px;">WINGO 30S HACK</h2>
        <div id="timer" style="color: #ff0050; font-size: 20px; font-weight: bold;">00:30</div>
        <div id="signal" style="font-size: 40px; font-weight: bold; margin: 15px 0;">READY</div>
        <div id="numbers" style="font-size: 18px; color: #ffd700; letter-spacing: 5px;">-- --</div>
        <br>
        <button class="btn btn-login" onclick="location.reload()">REFRESH HACK</button>
        <a href="https://t.me/SM_COMMUNITY7X" class="btn btn-tg">JOIN TELEGRAM</a>
    </div>

    <script>
        function checkLogin() {
            const key = document.getElementById('passInput').value;
            if (key === "FARHANBOSS00") {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('hack-interface').style.display = 'block';
                startHack();
            } else {
                alert("Wrong Key! Access Denied.");
            }
        }

        function startHack() {
            setInterval(() => {
                const now = new Date();
                const sec = now.getSeconds();
                const rem = 30 - (sec % 30);
                document.getElementById('timer').innerText = `Next Update: 00:${rem < 10 ? '0' : ''}${rem}`;
                if (rem === 30) updateSignal();
            }, 1000);
            updateSignal();
        }

        function updateSignal() {
            const isBig = Math.random() > 0.5;
            const sig = document.getElementById('signal');
            const num = document.getElementById('numbers');
            if (isBig) {
                sig.innerText = "BIG"; sig.style.color = "#00f2fe"; num.innerText = "6, 8";
            } else {
                sig.innerText = "SMALL"; sig.style.color = "#ff0050"; num.innerText = "0, 2";
            }
        }
    </script>
</body>
</html>
